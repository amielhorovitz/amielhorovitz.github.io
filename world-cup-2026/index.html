:root {
    --gold: #d4af37;
    --gold-glow: rgba(212, 175, 55, 0.3);
    --silver: #D9D9D9;
    --bronze: #CD7F32;
    --bg1: #0a1c15; /* Sleek Stadium Night Green */
    --bg2: #050b08; /* Dark Pitch Shadow */
    --bg3: #020503;
    --neon-green: #00ff87; /* Football pitch cyber neon */
    --text-muted: #8fa399;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, sans-serif;
    color: white;
    min-height: 100vh;
    padding: 40px 20px;

    /* Elevated Stadium Lighting Ambient Glow */
    background:
        radial-gradient(circle at top center,
        rgba(0, 255, 135, 0.12),
        transparent 35%),

        radial-gradient(circle at bottom center,
        rgba(212, 175, 55, 0.08),
        transparent 45%),

        linear-gradient(
            180deg,
            var(--bg1),
            var(--bg2) 50%,
            var(--bg3)
        );
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;

    background:
        radial-gradient(circle at 15% 0,
            rgba(255,255,255,.05),
            transparent 25%),

        radial-gradient(circle at 85% 0,
            rgba(255,255,255,.05),
            transparent 25%);
}

.container {
    max-width: 950px;
    margin: auto;
}

.hero {
    text-align: center;
    margin-bottom: 32px;
}

.trophy {
    font-size: 82px;
    filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6));
}

/* VIP Typography treatment */
h1 {
    margin-top: 10px;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(to bottom, #ffffff, #b8c6c0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h1 span {
    color: var(--neon-green);
    -webkit-text-fill-color: var(--neon-green);
    text-shadow: 0 0 20px rgba(0, 255, 135, 0.4);
}
