<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Predictions League</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: "Inter", sans-serif;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, #1f4fff 0%, transparent 30%),
    radial-gradient(circle at top right, #00d4ff 0%, transparent 25%),
    linear-gradient(135deg, #0b1020, #141b34);
  color: white;
  padding: 40px 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 16px;
  border-radius: 999px;
  font-size: 14px;
  backdrop-filter: blur(12px);
}

h1 {
  margin-top: 20px;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
}

.subtitle {
  margin-top: 10px;
  color: rgba(255,255,255,0.7);
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background: rgba(255,255,255,0.08);
}

th {
  text-align: left;
  padding: 20px;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.75);
}

td {
  padding: 20px;
}

tbody tr {
  border-top: 1px solid rgba(255,255,255,0.08);
  transition: all 0.25s ease;
}

tbody tr:hover {
  background: rgba(255,255,255,0.05);
}

.position {
  font-weight: 800;
  font-size: 1.1rem;
}

.gold {
  color: #ffd700;
}

.silver {
  color: #d8d8d8;
}

.bronze {
  color: #cd7f32;
}

.score {
  font-weight: 700;
  font-size: 1.1rem;
}

.loading {
  text-align: center;
  padding: 40px;
  color: rgba(255,255,255,0.7);
}

.footer {
  text-align: center;
  margin-top: 20px;
  color: rgba(255,255,255,0.55);
  font-size: 14px;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <div class="badge">⚽ FIFA World Cup 2026</div>
    <h1>Predictions League</h1>
    <p class="subtitle">
      Ranking based on correct match predictions
    </p>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Position</th>
          <th>Name</th>
          <th>Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard">
        <tr>
          <td colspan="3" class="loading">Loading standings...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="footer">
    Updated automatically from players.json
  </div>

</div>

<script>
async function loadLeaderboard() {
  try {
    const response = await fetch("players.json");
    const players = await response.json();

    players.sort((a, b) => b.score - a.score);

    const tbody = document.getElementById("leaderboard");

    tbody.innerHTML = players.map((player, index) => {
      let medalClass = "";

      if (index === 0) medalClass = "gold";
      else if (index === 1) medalClass = "silver";
      else if (index === 2) medalClass = "bronze";

      const position =
        index === 0 ? "🥇 1" :
        index === 1 ? "🥈 2" :
        index === 2 ? "🥉 3" :
        index + 1;

      return `
        <tr>
          <td class="position ${medalClass}">${position}</td>
          <td>${player.name}</td>
          <td class="score">${player.score}</td>
        </tr>
      `;
    }).join("");

  } catch (error) {
    document.getElementById("leaderboard").innerHTML = `
      <tr>
        <td colspan="3" class="loading">
          Failed to load players.json
        </td>
      </tr>
    `;
  }
}

loadLeaderboard();
</script>

</body>
</html>
