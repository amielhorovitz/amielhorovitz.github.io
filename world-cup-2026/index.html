<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Prediction League</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --gold: #FFD700;
    --silver: #D9D9D9;
    --bronze: #CD7F32;
    --bg1: #04111d;
    --bg2: #06203b;
    --bg3: #010a14;
    --blue: #0A6CFF;
    --cyan: #00BFFF;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Inter, sans-serif;
    color: white;
    min-height: 100vh;
    padding: 40px 20px;

    background:
        radial-gradient(circle at top center,
        rgba(255,215,0,.15),
        transparent 25%),

        radial-gradient(circle at bottom center,
        rgba(0,191,255,.15),
        transparent 35%),

        linear-gradient(
            180deg,
            var(--bg1),
            var(--bg2) 45%,
            var(--bg3)
        );
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;

    background:
        radial-gradient(circle at 15% 0,
            rgba(255,255,255,.12),
            transparent 20%),

        radial-gradient(circle at 85% 0,
            rgba(255,255,255,.12),
            transparent 20%);
}

.container {
    max-width: 950px;
    margin: auto;
}

.hero {
    text-align: center;
    margin-bottom: 32px;
}

.trophy {
    font-size: 82px;
    filter: drop-shadow(0 0 25px rgba(255,215,0,.8));
}

h1 {
    margin-top: 10px;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
}

.subtitle {
    margin-top: 8px;
    color: rgba(255,255,255,.75);
}

.status-bar {
    width: fit-content;
    margin: 20px auto 30px;

    padding: 10px 18px;

    border-radius: 999px;

    background: rgba(0,255,120,.12);
    border: 1px solid rgba(0,255,120,.25);

    color: #75ffb7;
    font-weight: 600;
}

.leader-card {
    text-align: center;

    background:
        linear-gradient(
            135deg,
            rgba(255,215,0,.22),
            rgba(255,215,0,.06)
        );

    border: 1px solid rgba(255,215,0,.25);

    border-radius: 24px;

    padding: 28px;
    margin-bottom: 24px;

    box-shadow: 0 0 40px rgba(255,215,0,.08);
}

.leader-label {
    color: var(--gold);
    font-size: .85rem;
    letter-spacing: 2px;
    font-weight: 700;
}

.leader-name {
    margin-top: 10px;
    font-size: 2.2rem;
    font-weight: 900;
}

.leader-score {
    margin-top: 6px;
    opacity: .8;
}

.card {
    overflow: hidden;

    border-radius: 28px;

    background: rgba(255,255,255,.05);

    border: 1px solid rgba(255,255,255,.08);

    backdrop-filter: blur(15px);

    box-shadow:
        0 20px 50px rgba(0,0,0,.45),
        0 0 50px rgba(255,215,0,.04);
}

table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background:
        linear-gradient(
            90deg,
            var(--blue),
            var(--cyan)
        );
}

th {
    padding: 20px;
    text-align: left;

    font-size: .8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
}

td {
    padding: 20px;
}

tbody tr {
    border-top: 1px solid rgba(255,255,255,.08);
    transition: .25s;
}

tbody tr:hover {
    background: rgba(255,255,255,.06);
}

.rank-1 {
    background:
        linear-gradient(
            90deg,
            rgba(255,215,0,.16),
            transparent
        );
}

.rank-2 {
    background:
        linear-gradient(
            90deg,
            rgba(220,220,220,.12),
            transparent
        );
}

.rank-3 {
    background:
        linear-gradient(
            90deg,
            rgba(205,127,50,.12),
            transparent
        );
}

.position {
    font-size: 1.15rem;
    font-weight: 800;
}

.score {
    font-weight: 800;
    font-size: 1.1rem;
}

.loading,
.error {
    text-align: center;
    padding: 40px;
}

.footer {
    text-align: center;
    margin-top: 20px;
    color: rgba(255,255,255,.55);
}

@media (max-width: 700px) {
    th, td {
        padding: 14px;
    }

    .leader-name {
        font-size: 1.7rem;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <div class="trophy">🏆</div>
        <h1>World Cup 2026</h1>
        <div class="subtitle">Prediction League</div>
    </div>

    <div class="status-bar">
        ⚽ Correct Predictions Ranking
    </div>

    <div id="leaderCard"></div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Position</th>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="leaderboard">
                <tr>
                    <td colspan="3" class="loading">
                        Loading leaderboard...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        FIFA World Cup 2026 Prediction League
    </div>

</div>

<script>
async function loadLeaderboard() {
    try {
        const response = await fetch('players.json');

        if (!response.ok) {
            throw new Error('Failed to load players.json');
        }

        const players = await response.json();

        // Sort by score descending
        players.sort((a, b) => b.score - a.score);

        // Calculate shared ranks
        let previousScore = null;
        let rank = 0;

        players.forEach((player, index) => {
            if (player.score !== previousScore) {
                rank = index + 1;
                previousScore = player.score;
            }

            player.rank = rank;
        });

        // Leader card
        const leaders = players.filter(
            p => p.score === players[0].score
        );

        document.getElementById('leaderCard').innerHTML = `
            <div class="leader-card">
                <div class="leader-label">
                    🏆 ${leaders.length > 1 ? 'CURRENT LEADERS' : 'CURRENT LEADER'}
                </div>
                <div class="leader-name">
                    ${leaders.map(p => p.name).join(' • ')}
                </div>
                <div class="leader-score">
                    ${players[0].score} points
                </div>
            </div>
        `;

        document.getElementById('leaderboard').innerHTML =
            players.map(player => {

                const medal =
                    player.rank === 1 ? '🥇' :
                    player.rank === 2 ? '🥈' :
                    player.rank === 3 ? '🥉' :
                    '#' + player.rank;

                const rowClass =
                    player.rank === 1 ? 'rank-1' :
                    player.rank === 2 ? 'rank-2' :
                    player.rank === 3 ? 'rank-3' :
                    '';

                return `
                    <tr class="${rowClass}">
                        <td class="position">${medal}</td>
                        <td>${player.name}</td>
                        <td class="score">${player.score}</td>
                    </tr>
                `;
            }).join('');

    } catch (error) {
        document.getElementById('leaderboard').innerHTML = `
            <tr>
                <td colspan="3" class="error">
                    Failed to load players.json
                </td>
            </tr>
        `;

        console.error(error);
    }
}

loadLeaderboard();
</script>

</body>
</html>
